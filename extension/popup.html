<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
    }
    .container {
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #8B5CF6, #2DD4BF);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .status {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #e5e5e5;
    }
    .status-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .status-value {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
    }
    .status-value.recording {
      color: #ef4444;
    }
    .status-value.connected {
      color: #22c55e;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8B5CF6, #7C3AED);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #fef2f2;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .recording-dot {
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .recording-time {
      font-weight: 600;
      color: #ef4444;
    }
    .login-prompt {
      text-align: center;
      padding: 20px;
    }
    .login-prompt p {
      color: #666;
      margin-bottom: 16px;
    }
    .platform-badge {
      display: inline-block;
      padding: 4px 8px;
      background: #f3f4f6;
      border-radius: 4px;
      font-size: 12px;
      color: #4b5563;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">R</div>
      <span class="title">Romelly AI</span>
    </div>

    <!-- Not logged in -->
    <div id="login-section" class="login-prompt hidden">
      <p>Inicia sesión en Romelly AI para comenzar a transcribir</p>
      <button class="btn btn-primary" id="login-btn">Iniciar Sesión</button>
    </div>

    <!-- Logged in - Not recording -->
    <div id="ready-section" class="hidden">
      <div class="status">
        <div class="status-label">Estado</div>
        <div class="status-value connected">✓ Conectado</div>
      </div>
      <div class="status">
        <div class="status-label">Plataforma detectada</div>
        <div class="status-value"><span class="platform-badge" id="platform">Detectando...</span></div>
      </div>
      <button class="btn btn-primary" id="start-btn">
        🎙️ Iniciar Grabación
      </button>
    </div>

    <!-- Recording -->
    <div id="recording-section" class="hidden">
      <div class="recording-indicator">
        <div class="recording-dot"></div>
        <span>Grabando</span>
        <span class="recording-time" id="recording-time">00:00</span>
      </div>
      <div class="status">
        <div class="status-label">Plataforma</div>
        <div class="status-value"><span class="platform-badge" id="recording-platform">Google Meet</span></div>
      </div>
      <button class="btn btn-danger" id="stop-btn">
        ⏹️ Detener y Analizar
      </button>
    </div>

    <!-- Processing -->
    <div id="processing-section" class="hidden">
      <div class="status">
        <div class="status-label">Procesando</div>
        <div class="status-value" id="processing-status">Transcribiendo...</div>
      </div>
      <div style="background: #e5e5e5; height: 6px; border-radius: 3px; overflow: hidden;">
        <div id="progress-bar" style="background: linear-gradient(90deg, #8B5CF6, #2DD4BF); height: 100%; width: 0%; transition: width 0.3s;"></div>
      </div>
    </div>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
