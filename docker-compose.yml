# ==============================================
# MeetAnalyzer SaaS - Docker Compose
# ==============================================
# PostgreSQL y MinIO serán servicios externos en Dokploy

version: '3.8'

services:
  # ==============================================
  # Redis - Para BullMQ jobs y caché
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: meetanalyzer-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - meetanalyzer
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==============================================
  # API - NestJS Backend
  # ==============================================
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: meetanalyzer-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      # Base
      NODE_ENV: production
      PORT: 4000
      
      # Redis (interno)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Database (externo - Dokploy)
      DATABASE_URL: ${DATABASE_URL}
      
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      
      # URLs
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      
      # External APIs
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      
      # Storage (externo - Dokploy MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - meetanalyzer

  # ==============================================
  # Web - React/Vite Frontend
  # ==============================================
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: meetanalyzer-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      # API URL for frontend
      VITE_API_URL: ${BACKEND_URL:-http://localhost:4000}
    depends_on:
      - api
    networks:
      - meetanalyzer

# ==============================================
# Volumes
# ==============================================
volumes:
  redis_data:
    driver: local
  api_logs:
    driver: local

# ==============================================
# Networks
# ==============================================
networks:
  meetanalyzer:
    driver: bridge