# ==============================================
# MeetAnalyzer SaaS - CI Pipeline
# ==============================================
# Se ejecuta en cada PR y push a main/develop

name: 🔄 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==============================================
  # Lint y Test
  # ==============================================
  lint-and-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest

    services:
      # PostgreSQL para testing
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: meetanalyzer_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      # Redis para testing
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🏗 Build
        run: npm run build
        env:
          # Variables mínimas para el build
          DATABASE_URL: postgresql://postgres:test123@localhost:5432/meetanalyzer_test
          JWT_SECRET: test-jwt-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: 🧪 Test API
        run: npm run test -w apps/api
        env:
          DATABASE_URL: postgresql://postgres:test123@localhost:5432/meetanalyzer_test
          JWT_SECRET: test-jwt-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ==============================================
  # Build Docker Images
  # ==============================================
  build-images:
    name: 🐋 Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    strategy:
      matrix:
        app: [api, web]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: 🏗 Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================
  # Security Scanning
  # ==============================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'